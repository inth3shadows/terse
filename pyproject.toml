[project]
name = "terse"
version = "0.0.1"
description = "Lossless-first compression layer for AI-agent tool outputs — byte-faithful on fields you mark critical, configurable lossy reduction only where you opt in."
requires-python = ">=3.11"
dependencies = [
    # tiktoken: cl100k_base token counts for headroom-eval parity. Pinned by uv.lock.
    "tiktoken",
]

[project.optional-dependencies]
# Anthropic count_tokens = ground-truth token count for the real consumer.
# Optional so the spike runs without an API key / network; tokenize.py imports it lazily.
anthropic = ["anthropic"]

[project.scripts]
terse = "terse.cli:main"

[dependency-groups]
dev = ["pytest", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/terse"]

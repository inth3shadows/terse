name: release
# ZERO-TOUCH releases. Two ways in, one publisher identity:
#
#   * push to `main` (the normal path) — the `version` job derives the next semver from the
#     Conventional-Commit types since the last tag (feat -> minor, fix/perf -> patch,
#     a breaking `!`/`BREAKING CHANGE` -> minor while 0.x), creates and pushes that tag,
#     then the same run builds, releases, and publishes. NOTHING is done by hand: no tag,
#     no version bump, no changelog graduation. A commit with only docs/chore/test/ci/etc.
#     types releases nothing.
#   * push a `vX.Y.Z` tag by hand — the override. `version` takes the tag as-is.
#   * the Actions "Run workflow" button (workflow_dispatch) — same as a main push, with an
#     optional forced bump.
#
# It stays ONE file (`release.yml`) on purpose: PyPI Trusted Publishing is bound to this
# workflow's filename, so reusing it means there is no PyPI reconfiguration to do — the
# whole point of "you don't have to do anything special". The tag is pushed with the
# built-in GITHUB_TOKEN, whose pushes deliberately do NOT trigger another workflow run, so
# the tag never re-fires this workflow: the push-to-main run does everything, once.
#
# The tag IS the version (hatch-vcs) — a build resolves to the tag, byte-for-byte. The
# distribution name is `terse-mcp` (bare `terse` is taken on PyPI); it normalizes to
# `terse_mcp` in wheel filenames (e.g. 0.5.0 -> terse_mcp-0.5.0-*.whl).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Force the bump level instead of deriving it from commits"
        type: choice
        options: [auto, patch, minor, major]
        default: auto

permissions: {} # least privilege — each job opts into exactly what it needs

# Serialize releases: two merges landing seconds apart must not race on tag creation
# (the loser's `git push <tag>` would fail under `set -e` and drop that push from any
# release). A fixed group with cancel-in-progress:false runs them one after another, so
# the second sees the first's tag and folds its commits into the next version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create + push the version tag
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      release: ${{ steps.decide.outputs.release }}
    steps:
      # fetch-depth: 0 — need every tag and commit to find the last release and the
      # commits since it. Shallow would misread both.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      # DECIDE the version but do NOT push the tag yet — the test gate below must pass
      # first. Pushing before the gate would burn a public version on a red build:
      # hatch-vcs resolves dev builds off that tag and the next auto-release computes
      # commits `since` it, permanently skipping the burned number.
      - id: decide
        env:
          FORCED_BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          # A hand-pushed tag is the version verbatim — already on origin, so nothing to
          # push (needtag=false); the gate still runs before anything reaches PyPI.
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            {
              echo "tag=${GITHUB_REF_NAME}"; echo "release=true"; echo "needtag=false"
            } >> "$GITHUB_OUTPUT"
            echo "hand-pushed tag ${GITHUB_REF_NAME}; releasing it as-is"
            exit 0
          fi

          # Idempotency: if THIS commit already carries a VERSION tag, a release ran for
          # it — do nothing. `--match 'v*'` so a stray `nightly`/`latest` tag on the commit
          # does not masquerade as a release and suppress a real one.
          if git describe --exact-match --match 'v*' --tags HEAD >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "HEAD already carries $(git describe --exact-match --match 'v*' --tags HEAD); nothing to do"
            exit 0
          fi

          # Last release = newest tag matching a CLEAN vMAJOR.MINOR.PATCH (a hand-pushed
          # pre-release like v1.2.0-rc1 must not become the base — `$((patch+1))` on
          # `0-rc1` is an arithmetic error that would abort every future auto-release).
          # `|| true` so a SIGPIPE from `head` can't abort the assignment under pipefail.
          last="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -n "$last" ]; then
            range="${last}..HEAD"
          else
            last="v0.0.0"; range="HEAD"   # first ever release: scan all history, not a nonexistent range
          fi
          echo "last release tag: ${last} (scanning ${range})"

          # Type detection reads SUBJECTS ONLY — a `docs:` commit whose BODY happens to
          # start a line `feat:`/`fix:` (quoting a changelog) must not trigger a release.
          # The `BREAKING CHANGE:` footer is the one signal that legitimately lives in a
          # body, so it — and only it — is matched against bodies too. Case-sensitive and
          # line-anchored: types are lowercase, `BREAKING CHANGE:` uppercase with a colon,
          # so prose like "not a breaking change" cannot trip a bump. Herestrings, not
          # pipes, so grep's status is never masked by a SIGPIPE under pipefail.
          subjects="$(git log --format='%s' "${range}")"
          bodies="$(git log --format='%b' "${range}")"
          bump=none
          if grep -qE '^[a-z]+(\([^)]*\))?!:' <<<"$subjects" \
             || grep -qE '^BREAKING[ -]CHANGE:' <<<"$bodies"; then
            bump=breaking
          elif grep -qE '^feat(\([^)]*\))?:' <<<"$subjects"; then
            bump=minor
          elif grep -qE '^(fix|perf)(\([^)]*\))?:' <<<"$subjects"; then
            bump=patch
          fi

          # A forced bump from the manual button overrides the derivation.
          case "${FORCED_BUMP:-auto}" in
            patch|minor|major) bump="${FORCED_BUMP}";;
          esac

          if [ "$bump" = "none" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "no feat/fix/breaking commits since ${last} — releasing nothing"
            exit 0
          fi

          ver="${last#v}"
          IFS=. read -r major minor patch <<EOF
          ${ver}
          EOF
          case "$bump" in
            major)             major=$((major+1)); minor=0; patch=0;;
            minor)             minor=$((minor+1)); patch=0;;
            breaking)
              if [ "$major" -gt 0 ]; then major=$((major+1)); minor=0; patch=0
              else minor=$((minor+1)); patch=0; fi;;
            patch)             patch=$((patch+1));;
          esac
          new="v${major}.${minor}.${patch}"
          echo "derived bump=${bump} -> ${new}"
          {
            echo "tag=${new}"; echo "release=true"; echo "needtag=true"
          } >> "$GITHUB_OUTPUT"
      # GATE before the tag is pushed. Same invocation as tests.yml (keeps CI keyless).
      # A red suite fails the job here, so no tag is ever pushed for a broken build.
      - if: steps.decide.outputs.release == 'true'
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - name: Test before tagging
        if: steps.decide.outputs.release == 'true'
        run: |
          uv sync --dev
          uv run pytest -q
      # Only NOW create + push the tag — the gate passed. Skipped for a hand-pushed tag
      # (needtag=false), which is already on origin.
      - name: Create + push the version tag
        if: steps.decide.outputs.release == 'true' && steps.decide.outputs.needtag == 'true'
        env:
          NEW_TAG: ${{ steps.decide.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "${NEW_TAG}" "${GITHUB_SHA}"
          git push origin "${NEW_TAG}"

  release:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload artifacts; nothing more
    env:
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      # Check out AT THE TAG (not the branch) so hatch-vcs resolves the version to it,
      # byte-for-byte. fetch-depth: 0 is REQUIRED — hatch-vcs uses `git describe`.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      # No test step here: the `version` job already ran the suite against this exact
      # commit BEFORE pushing the tag, so a red build never gets a tag to reach this job.
      - name: Build sdist + wheel
        run: uv build
      - name: Sanity-check the built version matches the tag
        # Fail loudly if hatch-vcs and the tag disagree — the artifact name must contain
        # the tag without its leading `v`.
        run: |
          expected="${TAG#v}"
          if ! ls dist/terse_mcp-"${expected}"-*.whl >/dev/null 2>&1; then
            echo "::error::built wheel does not match tag ${TAG} (expected version ${expected})"; ls -1 dist/; exit 1
          fi
          echo "built version ${expected} matches tag ${TAG}"
      # Build ONCE — the same artifacts go to both the GitHub Release and PyPI.
      - name: Upload dist for the publish job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # --generate-notes writes the notes from the merged PRs/commits since the last
        # release, so the release body is authored with no hand-written changelog step.
        run: gh release create "${TAG}" dist/* --generate-notes --title "${TAG}"

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest
    # `pypi` MUST match the Trusted Publisher's environment on PyPI, or the OIDC exchange is
    # rejected. Add a required reviewer in Settings -> Environments to turn the publish into
    # a one-click human gate — leaving it unprotected (the default) keeps releases zero-touch.
    environment:
      name: pypi
      url: https://pypi.org/project/terse-mcp/
    permissions:
      id-token: write # OIDC is the ONLY credential — no PyPI token is stored anywhere
    steps:
      - name: Download the built dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      # Trusted Publishing is automatic (no `with:` creds); PEP 740 attestations default on;
      # uploads everything in dist/ (packages-dir defaults to dist/).
      - name: Publish to PyPI (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
